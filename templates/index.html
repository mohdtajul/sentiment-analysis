<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Sentiment Analysis</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container d-flex justify-content-center align-items-center vh-100">

    <div class="card p-4 sentiment-card">

        <h2 class="text-center mb-4">Sentiment Analysis</h2>

        <form method="POST" action="/predict">

            <div class="mb-3">

                <textarea 
                class="form-control"
                name="comment"
                rows="3"
                placeholder="Enter your comment"></textarea>

            </div>

            <div class="mb-3">

                <select class="form-select" name="model">

                    <option value="svm">⭐ SVM Model (accuracy - 82.35%)</option>
                    <option value="logistic">Logistic Regression</option>
                    <option value="nb">Naive Bayes</option>

                </select>

            </div>

            <div class="d-grid">

                <button class="btn btn-primary">
                    Predict Sentiment
                </button>

            </div>

        </form>

        {% if prediction %}

        <div class="alert alert-info text-center mt-4 result-box">

            Sentiment : <strong>{{ prediction }}</strong>

        </div>

        {% endif %}

    </div>

</div>

</body>
</html>
